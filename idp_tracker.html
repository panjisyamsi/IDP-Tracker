<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDP Completion Tracker — PT. Amerta Indah Otsuka</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ── Layout ── */
.app-header {
  background: #003366;
  color: #fff;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.app-header img { height: 36px; }
.app-header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: .01em; }
.app-header span { font-size: .8rem; opacity: .7; display: block; margin-top: 2px; }

.main { max-width: 900px; margin: 0 auto; padding: 28px 16px 80px; }

/* ── Cards ── */
.card {
  background: #fff;
  border-radius: 12px;
  padding: 28px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 20px;
}
.card-title {
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #003366;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 2px solid #e8edf2;
}

/* ── Form Elements ── */
label { display: block; font-size: .82rem; font-weight: 600; color: #444; margin-bottom: 5px; }
select, input[type=text], input[type=password] {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid #d0d7e2;
  border-radius: 8px;
  font-size: .92rem;
  color: #1a1a2e;
  background: #fff;
  transition: border-color .2s;
}
select:focus, input:focus {
  outline: none;
  border-color: #003366;
  box-shadow: 0 0 0 3px rgba(0,51,102,.1);
}
.form-row { margin-bottom: 16px; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 22px;
  border: none;
  border-radius: 8px;
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .1s;
}
.btn:active { transform: scale(.98); }
.btn-primary   { background: #003366; color: #fff; }
.btn-primary:hover { background: #004080; }
.btn-secondary { background: #e8edf2; color: #003366; }
.btn-secondary:hover { background: #d5dce8; }
.btn-outline   { background: transparent; border: 1.5px solid #003366; color: #003366; }
.btn-outline:hover { background: #f0f4f8; }
.btn-sm { padding: 6px 14px; font-size: .8rem; }
.btn-full { width: 100%; }

/* ── Tab Nav ── */
.tab-nav {
  display: flex;
  gap: 4px;
  background: #e8edf2;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
}
.tab-btn {
  flex: 1;
  padding: 9px 14px;
  border: none;
  border-radius: 7px;
  background: transparent;
  font-size: .84rem;
  font-weight: 600;
  color: #667;
  cursor: pointer;
  transition: background .2s, color .2s;
}
.tab-btn.active { background: #fff; color: #003366; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

/* ── Progress Bar ── */
.progress-wrap { margin: 14px 0; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: .8rem;
  color: #667;
  margin-bottom: 5px;
}
.progress-bar-bg {
  height: 10px;
  background: #e8edf2;
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width .6s ease;
}
.fill-complete { background: #3B6D11; }
.fill-high     { background: #185FA5; }
.fill-mid      { background: #BA7517; }
.fill-low      { background: #A32D2D; }

/* ── Badges ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 99px;
  font-size: .72rem;
  font-weight: 700;
}
.b-complete { background: #e8f5e0; color: #3B6D11; }
.b-progress { background: #e0eaf8; color: #185FA5; }
.b-none     { background: #f0f0f0; color: #888; }
.b-online   { background: #e0eaf8; color: #185FA5; }
.b-offline  { background: #fff3e0; color: #BA7517; }
.b-selflearn{ background: #ede7f6; color: #512da8; }
.b-assigned { background: #e3f2fd; color: #0d47a1; font-size: .68rem; }

/* ── Tags (training belum selesai) ── */
.tag-list { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.tag-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  background: #fff3e0;
  border: 1px solid #f0c060;
  border-radius: 99px;
  font-size: .76rem;
  font-weight: 600;
  color: #7a4800;
}
.tag-link {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  color: #0066cc;
  text-decoration: none;
  font-weight: 700;
}
.tag-link:hover { text-decoration: underline; }
.tag-link svg { width: 11px; height: 11px; }

/* ── Schedule Cards ── */
.schedule-section { margin-top: 22px; }
.schedule-section-title {
  font-size: .78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #555;
  margin-bottom: 12px;
}
.schedule-list { display: flex; flex-direction: column; gap: 10px; }
.schedule-card {
  border: 1.5px solid #e0e7ef;
  border-radius: 10px;
  padding: 14px 16px;
  background: #fafcff;
}
.schedule-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}
.schedule-comp-name {
  font-size: .88rem;
  font-weight: 700;
  color: #003366;
  flex: 1;
}
.schedule-badges { display: flex; gap: 5px; flex-wrap: wrap; }
.schedule-meta {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 5px 14px;
}
.schedule-meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: .76rem;
  color: #555;
}
.schedule-meta-item svg { width: 12px; height: 12px; opacity: .6; flex-shrink: 0; }

/* Highlight kompetensi yang match dalam multi-comp schedule */
.matched-comp { color: #0d47a1; }
.other-comp   { color: #999; }

/* ── Team Table ── */
.team-table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  padding: 10px 12px;
  background: #f4f7fb;
  font-size: .76rem;
  font-weight: 700;
  color: #445;
  text-align: left;
  border-bottom: 2px solid #dde4ee;
  white-space: nowrap;
}
td {
  padding: 10px 12px;
  font-size: .82rem;
  border-bottom: 1px solid #eef1f6;
  vertical-align: middle;
}
tr.clickable:hover td { background: #f5f8ff; cursor: pointer; }

.lvl-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: .72rem;
  font-weight: 700;
}
.lvl-1 { background: #e0eaf8; color: #185FA5; }
.lvl-2 { background: #e8f5e0; color: #3B6D11; }
.lvl-3 { background: #fff3e0; color: #BA7517; }
.lvl-n { background: #f0f0f0; color: #888; }

/* ── Pagination ── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 16px;
  font-size: .82rem;
  color: #667;
}

/* ── Member Detail ── */
.member-detail-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.member-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: #003366;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 700;
  flex-shrink: 0;
}
.member-info-name  { font-size: 1.05rem; font-weight: 700; }
.member-info-sub   { font-size: .8rem; color: #667; margin-top: 2px; }

/* ── All Jadwal View ── */
.jadwal-filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.jadwal-filter-bar input,
.jadwal-filter-bar select {
  flex: 1;
  min-width: 160px;
  padding: 8px 12px;
  font-size: .83rem;
}

/* ── Utility ── */
.hidden { display: none !important; }
.mt-8  { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.text-muted { color: #888; font-size: .8rem; }
.divider { border: none; border-top: 1px solid #eef1f6; margin: 16px 0; }
.lms-link-wrap { margin-top: 20px; text-align: center; }

/* ── Loading / Error ── */
#loadingScreen {
  position: fixed; inset: 0;
  background: #f0f2f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 4px solid #d0d7e2;
  border-top-color: #003366;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loadingScreen p { color: #667; font-size: .9rem; }

.error-box {
  background: #fff0f0;
  border: 1.5px solid #f5a0a0;
  border-radius: 10px;
  padding: 16px 20px;
  color: #a32d2d;
  font-size: .85rem;
  margin-top: 12px;
}

/* ── Bottom Nav (mobile) ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid #e0e7ef;
  display: flex;
  z-index: 200;
  box-shadow: 0 -2px 10px rgba(0,0,0,.07);
}
.bottom-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 4px;
  border: none;
  background: transparent;
  color: #888;
  font-size: .65rem;
  font-weight: 600;
  cursor: pointer;
  transition: color .2s;
  border-top: 2px solid transparent;
}
.bottom-nav-btn.active { color: #003366; border-top-color: #003366; }
.bottom-nav-btn svg { width: 20px; height: 20px; }

@media (max-width: 600px) {
  .main { padding: 16px 12px 80px; }
  .card { padding: 18px 14px; }
  .schedule-meta { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <p>Memuat data IDP...</p>
</div>

<!-- Header -->
<header class="app-header">
  <div>
    <h1>IDP Completion Tracker</h1>
    <span>PT. Amerta Indah Otsuka</span>
  </div>
</header>

<!-- Main Content (hidden until data loaded) -->
<div class="main hidden" id="appContent">

  <!-- SCREEN: Gate (Department + Password) -->
  <div id="screenGate">
    <div class="card">
      <div class="card-title">Akses Tracker</div>
      <div class="form-row">
        <label for="gatedept">Departemen</label>
        <select id="gatedept"><option value="">— Pilih departemen —</option></select>
      </div>
      <div class="form-row">
        <label for="gatepass">Password</label>
        <input type="password" id="gatepass" placeholder="Masukkan password departemen">
      </div>
      <div id="gateError" class="error-box hidden">Password salah atau departemen tidak terdaftar.</div>
      <div class="mt-12">
        <button class="btn btn-primary btn-full" onclick="submitGate()">Masuk</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: Main (setelah login) -->
  <div id="screenMain" class="hidden">

    <!-- Tab Navigation -->
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('progress')" id="tabProgress">Track My Progress</button>
      <button class="tab-btn" onclick="switchTab('team')" id="tabTeam">Track My Team</button>
      <button class="tab-btn" onclick="switchTab('jadwal')" id="tabJadwal">Semua Jadwal</button>
    </div>

    <!-- TAB: Track My Progress -->
    <div id="tabContentProgress">
      <div class="card">
        <div class="card-title">Cek Progress Saya</div>
        <div class="form-row">
          <label for="nikInput">NIK Karyawan</label>
          <input type="text" id="nikInput" placeholder="Masukkan NIK Anda" oninput="clearProgressResult()">
        </div>
        <button class="btn btn-primary" onclick="lookupEmployee()">Cek Progress</button>
        <div id="progressResult" class="mt-16 hidden"></div>
      </div>
    </div>

    <!-- TAB: Track My Team -->
    <div id="tabContentTeam" class="hidden">
      <div class="card" id="teamCard">
        <div class="card-title">Progress Tim Saya</div>
        <div class="form-row">
          <label for="spvInput">Nama Supervisor</label>
          <input type="text" id="spvInput" placeholder="Ketik nama supervisor..." oninput="filterTeam()">
        </div>

        <!-- Team Table -->
        <div id="teamTableWrap" class="team-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nama</th>
                <th>NIK</th>
                <th>Grade</th>
                <th>Progress</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="teamTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="teamPagination"></div>
      </div>

      <!-- Member Detail View -->
      <div class="card hidden" id="memberDetailCard">
        <button class="btn btn-secondary btn-sm" onclick="backToTeam()" style="margin-bottom:18px">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M10 12L6 8l4-4"/></svg>
          Kembali ke Tim
        </button>
        <div id="memberDetailContent"></div>
      </div>
    </div>

    <!-- TAB: Semua Jadwal -->
    <div id="tabContentJadwal" class="hidden">
      <div class="card">
        <div class="card-title">Jadwal Training Mendatang</div>
        <div class="jadwal-filter-bar">
          <input type="text" id="jadwalSearch" placeholder="Cari kompetensi / trainer..." oninput="renderAllJadwal()">
          <select id="jadwalTypeFilter" onchange="renderAllJadwal()">
            <option value="">Semua Tipe</option>
            <option value="Online">Online</option>
            <option value="Offline">Offline</option>
            <option value="Self Learning">Self Learning</option>
          </select>
        </div>
        <div id="allJadwalList"></div>
      </div>
    </div>

  </div><!-- /screenMain -->

</div><!-- /appContent -->

<!-- Bottom Nav -->
<nav class="bottom-nav hidden" id="bottomNav">
  <button class="bottom-nav-btn active" id="navProgress" onclick="switchTab('progress')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Progress Saya
  </button>
  <button class="bottom-nav-btn" id="navTeam" onclick="switchTab('team')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Tim Saya
  </button>
  <button class="bottom-nav-btn" id="navJadwal" onclick="switchTab('jadwal')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Jadwal
  </button>
</nav>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCV7j4CHY7ljwsZxBQ1g_qdLkmhTkIwob7f78kKPEs8eyxT0Un2x7Gv_JosbSrWtpqvw/exec";
var LMS_URL = "https://myapps.aio.co.id/otsukago-mobile";

// ─── State ───────────────────────────────────────────────────────────────────
var appData = null;          // { employees, schedules, assignmentIndex, departments }
var currentDept = "";
var currentTab = "progress";
var teamFiltered = [];
var teamPage = 1;
var PAGE_SIZE = 15;

// ─── Boot ────────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", function() {
  fetch(APPS_SCRIPT_URL + "?action=getData")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      appData = data;
      populateDeptDropdown();
      document.getElementById("loadingScreen").classList.add("hidden");
      document.getElementById("appContent").classList.remove("hidden");
    })
    .catch(function(err) {
      document.getElementById("loadingScreen").innerHTML =
        '<div style="text-align:center;padding:40px 20px">' +
        '<p style="color:#a32d2d;font-weight:700;font-size:1rem">Gagal memuat data</p>' +
        '<p style="color:#888;font-size:.85rem;margin-top:8px">' + err.message + '</p>' +
        '</div>';
    });
});

function populateDeptDropdown() {
  var el = document.querySelector("#screenGate select");
  if (!el || !appData) return;
  el.innerHTML = '<option value="">— Pilih departemen —</option>';
  (appData.departments || []).forEach(function(d) {
    var opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    el.appendChild(opt);
  });
}

// ─── Gate ────────────────────────────────────────────────────────────────────
function submitGate() {
  var deptEl = document.querySelector("#screenGate select");
  var passEl = document.getElementById("gatepass");
  var dept   = deptEl ? deptEl.value : "";
  var pass   = passEl ? passEl.value : "";

  if (!dept || !pass) {
    showGateError("Silakan pilih departemen dan isi password.");
    return;
  }

  fetch(APPS_SCRIPT_URL + "?action=verifyPassword&dept=" +
        encodeURIComponent(dept) + "&password=" + encodeURIComponent(pass))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.valid) {
        currentDept = dept;
        document.getElementById("screenGate").classList.add("hidden");
        document.getElementById("screenMain").classList.remove("hidden");
        document.getElementById("bottomNav").classList.remove("hidden");
        // Pre-filter tim berdasarkan department
        filterTeam();
        renderAllJadwal();
      } else {
        showGateError("Password salah atau departemen tidak terdaftar.");
      }
    })
    .catch(function() {
      showGateError("Terjadi kesalahan jaringan. Coba lagi.");
    });
}

function showGateError(msg) {
  var el = document.getElementById("gateError");
  el.textContent = msg;
  el.classList.remove("hidden");
}

// ─── Tab Switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  var tabs    = ["progress", "team", "jadwal"];
  var navIds  = { progress: "navProgress", team: "navTeam", jadwal: "navJadwal" };
  var btnIds  = { progress: "tabProgress", team: "tabTeam", jadwal: "tabJadwal" };
  var contIds = { progress: "tabContentProgress", team: "tabContentTeam", jadwal: "tabContentJadwal" };

  tabs.forEach(function(t) {
    var content = document.getElementById(contIds[t]);
    var tabBtn  = document.getElementById(btnIds[t]);
    var navBtn  = document.getElementById(navIds[t]);
    if (content) content.classList.toggle("hidden", t !== tab);
    if (tabBtn)  tabBtn.classList.toggle("active", t === tab);
    if (navBtn)  navBtn.classList.toggle("active", t === tab);
  });
}

// ─── Track My Progress ───────────────────────────────────────────────────────

function clearProgressResult() {
  document.getElementById("progressResult").classList.add("hidden");
}

function lookupEmployee() {
  var nik = document.getElementById("nikInput").value.trim();
  if (!nik) return;

  var emp = findEmployee(nik);
  var resultEl = document.getElementById("progressResult");

  if (!emp) {
    resultEl.innerHTML = '<div class="error-box">NIK tidak ditemukan. Pastikan NIK yang dimasukkan benar.</div>';
    resultEl.classList.remove("hidden");
    return;
  }

  resultEl.innerHTML = buildProgressHTML(emp);
  resultEl.classList.remove("hidden");
}

function findEmployee(nik) {
  if (!appData) return null;
  return appData.employees.find(function(e) { return e.nik === nik; }) || null;
}

function buildProgressHTML(emp) {
  var pct   = emp.progress;
  var pFill = pct >= 100 ? "fill-complete" : pct >= 70 ? "fill-high" : pct >= 40 ? "fill-mid" : "fill-low";
  var tags  = parseTags(emp.notCompleted);

  // Ambil assignment dari assignmentIndex
  var assignments = (appData.assignmentIndex && appData.assignmentIndex[emp.nik]) || [];

  // Cari jadwal yang relevan berdasarkan assignments
  var matchedSchedules = matchSchedulesForEmployee(emp, assignments);

  var html = '<div class="member-detail-header">' +
    '<div class="member-avatar">' + initials(emp.name) + '</div>' +
    '<div>' +
      '<div class="member-info-name">' + esc(emp.name) + '</div>' +
      '<div class="member-info-sub">' + esc(emp.grade) + ' &bull; ' + esc(emp.department) + '</div>' +
    '</div>' +
  '</div>';

  // Progress bar
  html += '<div class="progress-wrap">' +
    '<div class="progress-label"><span>Progress IDP</span><span>' + pct + '%</span></div>' +
    '<div class="progress-bar-bg"><div class="progress-bar-fill ' + pFill + '" style="width:' + pct + '%"></div></div>' +
  '</div>';

  // Training belum selesai
  if (tags.length > 0) {
    html += '<div class="mt-12"><div class="text-muted" style="margin-bottom:6px">Training belum selesai:</div>';
    html += '<div class="tag-list">' + tags.map(function(t) { return tagHtml(t); }).join("") + '</div></div>';
  } else {
    html += '<div class="mt-12 text-muted">Semua training sudah selesai.</div>';
  }

  // Assignment dari SPV
  if (assignments.length > 0) {
    html += '<hr class="divider">' +
      '<div class="text-muted" style="margin-bottom:8px;font-weight:700">Target Level dari SPV:</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    assignments.forEach(function(a) {
      html += '<span class="badge b-assigned">' + esc(a.competency) + ' &rarr; Level ' + a.targetLevel + '</span>';
    });
    html += '</div>';
  }

  // Upcoming schedule section
  html += buildScheduleSection(matchedSchedules);

  // LMS link
  html += '<div class="lms-link-wrap">' +
    '<a href="' + LMS_URL + '" target="_blank" rel="noopener noreferrer" class="btn btn-outline">' +
      '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M7 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9"/><path d="M10 1h5v5M14 2L8 8"/></svg>' +
      'Buka Otsuka ILMU' +
    '</a>' +
  '</div>';

  return html;
}

/**
 * Core matching logic baru:
 * Untuk setiap assignment (competency + targetLevel) milik karyawan:
 *   1. Cari jadwal yang kompetensinyamengandung nama kompetensi tersebut (partial match)
 *   2. Cari jadwal yang level rangenya mencakup targetLevel tersebut
 *   3. Cari jadwal yang grade participant-nya mencakup grade karyawan
 *   4. Tandai kompetensi mana yang match dalam jadwal multi-kompetensi
 *
 * Satu jadwal bisa match untuk beberapa kompetensi sekaligus.
 * Jadwal yang sama tidak ditampilkan dua kali (deduplicate by index).
 */
function matchSchedulesForEmployee(emp, assignments) {
  if (!appData || !appData.schedules) return [];
  var schedules    = appData.schedules;
  var empGrade     = emp.grade;
  var results      = []; // { scheduleIdx, matchedComps: [] }
  var seenSchedule = {}; // scheduleIdx → index di results

  assignments.forEach(function(assignment) {
    var compName    = assignment.competency;
    var targetLevel = assignment.targetLevel;

    schedules.forEach(function(sched, idx) {
      // Filter 1: grade karyawan harus ada dalam participant range
      if (sched.participantGrades.length > 0 &&
          sched.participantGrades.indexOf(empGrade) === -1) {
        return;
      }

      // Filter 2: level range jadwal harus mencakup targetLevel
      if (sched.levelRange.length > 0 &&
          sched.levelRange.indexOf(targetLevel) === -1) {
        return;
      }

      // Filter 3: salah satu kompetensi di jadwal harus match nama kompetensi assignment
      var compMatch = sched.competencyList.some(function(c) {
        return c.toLowerCase().indexOf(compName.toLowerCase()) !== -1 ||
               compName.toLowerCase().indexOf(c.toLowerCase()) !== -1;
      });
      if (!compMatch) return;

      // Jadwal lolos — catat matched competency
      if (seenSchedule.hasOwnProperty(idx)) {
        // Jadwal sudah ada di results, tambahkan matchedComp jika belum ada
        var existingResult = results[seenSchedule[idx]];
        var alreadyAdded = existingResult.matchedComps.some(function(mc) {
          return mc.competency === compName && mc.targetLevel === targetLevel;
        });
        if (!alreadyAdded) {
          existingResult.matchedComps.push({ competency: compName, targetLevel: targetLevel });
        }
      } else {
        seenSchedule[idx] = results.length;
        results.push({
          schedule:     sched,
          matchedComps: [{ competency: compName, targetLevel: targetLevel }]
        });
      }
    });
  });

  // Sort: Self Learning terakhir, lainnya berdasarkan tanggal ascending
  results.sort(function(a, b) {
    if (a.schedule.isSelfLearning !== b.schedule.isSelfLearning) {
      return a.schedule.isSelfLearning ? 1 : -1;
    }
    return a.schedule.dateRaw - b.schedule.dateRaw;
  });

  return results;
}

function buildScheduleSection(matchedSchedules) {
  if (matchedSchedules.length === 0) {
    return '<div class="schedule-section"><div class="text-muted mt-8">Tidak ada jadwal mendatang yang sesuai dengan target assignment.</div></div>';
  }

  var html = '<div class="schedule-section">' +
    '<div class="schedule-section-title">Jadwal Training Mendatang (' + matchedSchedules.length + ' sesi)</div>' +
    '<div class="schedule-list">';

  matchedSchedules.forEach(function(result) {
    html += buildScheduleCard(result.schedule, result.matchedComps);
  });

  html += '</div></div>';
  return html;
}

function buildScheduleCard(sched, matchedComps) {
  // Bangun tampilan kompetensi — highlight yang match, redup yang lain
  var compDisplay = sched.competencyList.map(function(c) {
    var isMatch = matchedComps && matchedComps.some(function(mc) {
      return mc.competency.toLowerCase().indexOf(c.toLowerCase()) !== -1 ||
             c.toLowerCase().indexOf(mc.competency.toLowerCase()) !== -1;
    });
    return '<span class="' + (isMatch ? "matched-comp" : "other-comp") + '">' + esc(c) + '</span>';
  }).join('<span style="color:#ccc"> &bull; </span>');

  // Badge tipe training
  var typeBadge = sched.isSelfLearning
    ? '<span class="badge b-selflearn">Self Learning</span>'
    : sched.trainingType.toLowerCase() === "offline"
      ? '<span class="badge b-offline">Offline</span>'
      : '<span class="badge b-online">Online</span>';

  // Info level target dari assignment (jika ada matchedComps)
  var levelInfo = "";
  if (matchedComps && matchedComps.length > 0) {
    var levelStr = matchedComps.map(function(mc) {
      return esc(mc.competency) + " L" + mc.targetLevel;
    }).join(", ");
    levelInfo = '<span class="badge b-assigned" style="margin-left:4px">Target: ' + levelStr + '</span>';
  }

  var html = '<div class="schedule-card">' +
    '<div class="schedule-card-header">' +
      '<div class="schedule-comp-name">' + compDisplay + '</div>' +
      '<div class="schedule-badges">' + typeBadge + '</div>' +
    '</div>';

  if (levelInfo) {
    html += '<div style="margin-bottom:8px">' + levelInfo + '</div>';
  }

  html += '<div class="schedule-meta">';

  // Tanggal
  if (sched.isSelfLearning) {
    html += schedMetaItem(iconCalendar(), sched.dateEnd
      ? "Berakhir: " + sched.dateEnd
      : "Self Learning");
  } else {
    html += schedMetaItem(iconCalendar(), sched.date + (sched.time ? " | " + sched.time : ""));
  }

  if (sched.trainer) html += schedMetaItem(iconPerson(), sched.trainer);
  if (sched.location) html += schedMetaItem(iconLocation(), sched.location);
  if (sched.area)    html += schedMetaItem(iconArea(), sched.area);

  html += '</div></div>';
  return html;
}

function schedMetaItem(icon, text) {
  return '<div class="schedule-meta-item">' + icon + '<span>' + esc(text) + '</span></div>';
}

// ─── Track My Team ───────────────────────────────────────────────────────────
function filterTeam() {
  if (!appData) return;
  var spvQuery = (document.getElementById("spvInput").value || "").trim().toLowerCase();

  teamFiltered = appData.employees.filter(function(e) {
    var deptMatch  = !currentDept || e.department === currentDept;
    var spvMatch   = !spvQuery || (e.supervisor || "").toLowerCase().indexOf(spvQuery) !== -1;
    return deptMatch && spvMatch;
  });

  teamPage = 1;
  renderTeamTable();
}

function renderTeamTable() {
  var tbody = document.getElementById("teamTableBody");
  var start = (teamPage - 1) * PAGE_SIZE;
  var pageData = teamFiltered.slice(start, start + PAGE_SIZE);

  if (pageData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:24px">Tidak ada data ditemukan.</td></tr>';
    document.getElementById("teamPagination").innerHTML = "";
    return;
  }

  tbody.innerHTML = pageData.map(function(emp, i) {
    var pct    = emp.progress;
    var pFill  = pct >= 100 ? "fill-complete" : pct >= 70 ? "fill-high" : pct >= 40 ? "fill-mid" : "fill-low";
    var badge  = pct >= 100
      ? '<span class="badge b-complete">Complete</span>'
      : pct > 0
        ? '<span class="badge b-progress">On Progress</span>'
        : '<span class="badge b-none">Not Started</span>';

    var lvlIdx = (teamPage - 1) * PAGE_SIZE + i;
    return '<tr class="clickable" onclick="openMemberDetail(\'' + esc(emp.nik) + '\')">' +
      '<td>' + esc(emp.name) + '</td>' +
      '<td>' + esc(emp.nik) + '</td>' +
      '<td>' + esc(emp.grade) + '</td>' +
      '<td>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div class="progress-bar-bg" style="width:80px;flex-shrink:0">' +
            '<div class="progress-bar-fill ' + pFill + '" style="width:' + pct + '%"></div>' +
          '</div>' +
          '<span style="font-size:.78rem;color:#667">' + pct + '%</span>' +
        '</div>' +
      '</td>' +
      '<td>' + badge + '</td>' +
    '</tr>';
  }).join("");

  // Pagination
  var totalPages = Math.ceil(teamFiltered.length / PAGE_SIZE);
  var pag = document.getElementById("teamPagination");
  if (totalPages <= 1) {
    pag.innerHTML = '<span>' + teamFiltered.length + ' karyawan</span>';
  } else {
    pag.innerHTML =
      '<button class="btn btn-secondary btn-sm" onclick="changePage(-1)" ' + (teamPage === 1 ? "disabled" : "") + '>&#8592;</button>' +
      '<span>' + teamPage + ' / ' + totalPages + ' &nbsp;(' + teamFiltered.length + ' karyawan)</span>' +
      '<button class="btn btn-secondary btn-sm" onclick="changePage(1)" ' + (teamPage === totalPages ? "disabled" : "") + '>&#8594;</button>';
  }
}

function changePage(dir) {
  var totalPages = Math.ceil(teamFiltered.length / PAGE_SIZE);
  teamPage = Math.max(1, Math.min(totalPages, teamPage + dir));
  renderTeamTable();
}

function openMemberDetail(nik) {
  var emp = findEmployee(nik);
  if (!emp) return;

  var assignments = (appData.assignmentIndex && appData.assignmentIndex[nik]) || [];
  var matchedSchedules = matchSchedulesForEmployee(emp, assignments);

  document.getElementById("teamTableWrap").classList.add("hidden");
  document.getElementById("teamPagination").classList.add("hidden");
  document.querySelector("#teamCard .form-row").classList.add("hidden");
  document.querySelector("#teamCard .card-title").classList.add("hidden");
  document.getElementById("memberDetailCard").classList.remove("hidden");

  document.getElementById("memberDetailContent").innerHTML = buildProgressHTML(emp);
}

function backToTeam() {
  document.getElementById("memberDetailCard").classList.add("hidden");
  document.getElementById("teamTableWrap").classList.remove("hidden");
  document.getElementById("teamPagination").classList.remove("hidden");
  document.querySelector("#teamCard .form-row").classList.remove("hidden");
  document.querySelector("#teamCard .card-title").classList.remove("hidden");
}

// ─── All Jadwal Tab ───────────────────────────────────────────────────────────
function renderAllJadwal() {
  if (!appData) return;
  var search    = (document.getElementById("jadwalSearch").value || "").toLowerCase();
  var typeFilter = document.getElementById("jadwalTypeFilter").value;

  var filtered = appData.schedules.filter(function(s) {
    var typeMatch = !typeFilter || s.trainingType === typeFilter;
    var searchMatch = !search ||
      s.competencyRaw.toLowerCase().indexOf(search) !== -1 ||
      (s.trainer || "").toLowerCase().indexOf(search) !== -1;
    return typeMatch && searchMatch;
  });

  filtered.sort(function(a, b) {
    if (a.isSelfLearning !== b.isSelfLearning) return a.isSelfLearning ? 1 : -1;
    return a.dateRaw - b.dateRaw;
  });

  var el = document.getElementById("allJadwalList");
  if (filtered.length === 0) {
    el.innerHTML = '<div class="text-muted" style="text-align:center;padding:24px">Tidak ada jadwal ditemukan.</div>';
    return;
  }

  el.innerHTML = '<div class="schedule-list">' +
    filtered.map(function(s) { return buildScheduleCard(s, null); }).join("") +
    '</div>';
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function parseTags(str) {
  if (!str || str.trim() === "") return [];
  return str.split(",").map(function(s) { return s.trim(); }).filter(Boolean);
}

function tagHtml(label) {
  return '<span class="tag-item">' + esc(label) +
    '&nbsp;<a href="' + LMS_URL + '" target="_blank" rel="noopener noreferrer" class="tag-link"' +
    ' onclick="event.stopPropagation()">' +
      '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6h8M6 2l4 4-4 4"/></svg>Open' +
    '</a></span>';
}

function initials(name) {
  var parts = (name || "").trim().split(" ").filter(Boolean);
  if (parts.length === 0) return "?";
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function esc(str) {
  return String(str || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

}

}
